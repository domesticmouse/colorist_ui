name: colorist_ui
description: "A Flutter library of UI components for an LLM codelab."
version: 0.5.1
repository: https://github.com/domesticmouse/colorist_ui

environment:
  sdk: ^3.12.0

dependencies:
  characters: ^1.4.1
  collection: ^1.19.1
  flutter:
    sdk: flutter
  flutter_markdown_plus: ^1.0.7
  flutter_riverpod: ^3.3.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  logging: ^1.3.0
  riverpod_annotation: ^4.0.3
  uuid: ^4.5.3

dev_dependencies:
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  mocktail: ^1.0.5
  riverpod_generator: ^4.0.4

flutter:
  uses-material-design: true
